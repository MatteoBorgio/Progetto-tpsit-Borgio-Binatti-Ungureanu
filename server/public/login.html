<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Q&A Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex align-items-center vh-100">

<main class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                <div class="bg-primary p-1"></div>

                <div class="card-body p-5">

                    <div class="text-center mb-4">
                        <i class="bi bi-box-arrow-in-right text-primary" style="font-size: 3rem;"></i>
                        <h2 class="fw-bold mt-2 text-dark">Bentornato!</h2>
                        <p class="text-muted">Accedi per continuare a partecipare.</p>
                    </div>

                    <form onsubmit="sendLoginForm(event)">

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="username" name="username" placeholder="Inserisci il tuo username" required>
                            <label for="username" class="text-muted"><i class="bi bi-person me-2"></i>Username</label>
                        </div>

                        <div class="form-floating mb-4">
                            <input type="email" class="form-control" id="email" name="email" placeholder="Inserisci la tua email" required>
                            <label for="email" class="text-muted"><i class="bi bi-envelope me-2"></i>Email</label>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Accedi
                        </button>
                    </form>

                    <div class="text-center mt-4 pt-3 border-top">
                        <span class="text-muted">Non hai un profilo?</span>
                        <a href="/register" class="text-primary text-decoration-none fw-semibold">Registrati</a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</main>

<script>
    async function sendLoginForm(event) {
        event.preventDefault();

        const loginData = {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value
        };

        const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(loginData)
        });

        const data = await response.json();

        if (!data.success) {
            alert("Errore: " + data.message);
        } else {
            window.location.href = `/?user=${data.name}`;
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
