<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevAnswers - Community</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light" onload="renderPosts()">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom fixed-top shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="/">
            <i class="bi bi-braces me-2"></i>DevAnswers
        </a>
        <div class="d-flex align-items-center gap-3">
            <div id="userBadge" class="text-muted d-none d-sm-block">
                <i class="bi bi-person-circle fs-4"></i>
            </div>
            <button class="btn btn-primary fw-semibold rounded-pill px-4 shadow-sm" data-bs-toggle="modal" data-bs-target="#newPostModal">
                <i class="bi bi-plus-lg me-1"></i> Chiedi
            </button>
        </div>
    </div>
</nav>

<main class="container mt-5 pt-4 mb-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold mb-0 text-dark">Ultime Discussioni</h4>
                <button class="btn btn-light btn-sm text-muted rounded-pill" onclick="renderPosts()">
                    <i class="bi bi-arrow-clockwise me-1"></i> Aggiorna
                </button>
            </div>
            <div id="postsContainer"></div>
        </div>
    </div>
</main>

<div class="modal fade" id="newPostModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow rounded-4">
            <div class="modal-header border-bottom bg-light">
                <h5 class="modal-title fw-bold">Crea una discussione</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="postForm" onsubmit="sendPost(event)">
                <div class="modal-body p-4">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="titolo" placeholder="Titolo" required>
                        <label class="text-muted">Di cosa vuoi parlare?</label>
                    </div>
                    <div class="form-floating mb-3">
                        <textarea class="form-control" id="testo" placeholder="Testo" style="height: 120px" required></textarea>
                        <label class="text-muted">Descrivi il tuo dubbio...</label>
                    </div>
                </div>
                <div class="modal-footer border-top-0 pt-0 px-4 pb-4">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Annulla</button>
                    <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm">Pubblica ora</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function findActualUser() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('user') || "Utente anonimo";
    }

    async function sendPost(event) {
        event.preventDefault();

        const postData = {
            titolo: document.getElementById('titolo').value,
            testo: document.getElementById('testo').value,
            autore: findActualUser()
        };

        const response = await fetch('/api/post', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(postData)
        });

        if (response.ok) {
            bootstrap.Modal.getInstance(document.getElementById('newPostModal')).hide();
            document.getElementById('postForm').reset();
            await renderPosts();
        }
    }

    async function renderPosts() {
        const user = findActualUser();
        if (user !== "Utente anonimo") {
            document.getElementById('userBadge').innerHTML = `<span class="me-2 fw-bold text-primary">${user}</span><i class="bi bi-person-circle fs-4 text-primary"></i>`;
        }

        const container = document.getElementById('postsContainer');
        const response = await fetch('/posts');
        const data = await response.json();

        if (!data.success) return;

        container.innerHTML = "";
        data.posts.reverse().forEach(post => {
            const card = document.createElement('div');
            card.className = 'card border-0 shadow-sm rounded-4 mb-4';
            card.innerHTML = `
                    <div class="card-body p-4">
                        <div class="d-flex align-items-center mb-3">
                            <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex justify-content-center align-items-center me-3" style="width: 40px; height: 40px;">
                                <i class="bi bi-person-fill"></i>
                            </div>
                            <div>
                                <h6 class="mb-0 fw-bold">${post.autore || 'Anonimo'}</h6>
                            </div>
                        </div>
                        <h5 class="fw-bold">${post.titolo}</h5>
                        <p class="text-secondary">${post.testo}</p>
                    </div>`;
            container.appendChild(card);
        });
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html></body>
</html>
