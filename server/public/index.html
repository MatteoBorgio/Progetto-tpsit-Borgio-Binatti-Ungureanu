<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevAnswers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light" onload="renderPosts()">

    <nav class="navbar navbar-light bg-white shadow-sm">
        <div class="container">
            <span class="navbar-brand fw-bold">DevAnswers</span>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newPostModal">
                Nuova Domanda
            </button>
        </div>
    </nav>

    <main class="container my-4">
        <h4 class="mb-4">Ultime Domande</h4>
        <div id="postsContainer"></div>
    </main>

    <div class="modal fade" id="newPostModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Nuova Domanda</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <form action="/api/post" method="POST">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Titolo</label>
                            <input type="text" class="form-control" name="titolo" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Testo</label>
                            <textarea class="form-control" name="testo" rows="4" required></textarea>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary">
                            Pubblica
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>
    
    <script>
        async function renderPosts() {
            const response = await fetch('/posts');
            const data = await response.json();
            if (!data.success) {
                console.log("Si è verificato un errore: " + data.error);
            }
            const postsContainer = document.getElementById('postsContainer');
            postsContainer.innerHTML = "";
            
            data.posts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'card mb-3';
                card.innerHTML = `
                    <div class="card-body">
                        <h5 class="card-title">${post.title}</h5>
                        <p class="card-text">${post.content}</p>
                    </div>
                `;
                postsContainer.appendChild(card);
            });
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
